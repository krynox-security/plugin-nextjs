name: Release

# Publishes to npm on a version tag (e.g. `git tag v0.2.0 && git push --tags`). Dormant until a tag
# is pushed. Requires the NPM_TOKEN repo secret (npm automation token). Provenance needs a public repo.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
